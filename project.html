<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>__BRAND__ — プロジェクト</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header id="app-header"></header>

  <main class="container">
    <div class="eyebrow">Project</div>
    <h1 class="page-title" id="project-title">読み込み中…</h1>

    <!-- Upload (internal only) -->
    <div class="card dropzone" id="upload-card" style="display:none; margin-bottom:8px;">
      <div class="form-row">
        <div class="field">
          <label for="file-input">ファイルをアップロード / Upload (HTML, Markdown, テキスト, 画像)</label>
          <input type="file" id="file-input" multiple accept=".html,.htm,.md,.txt,.png,.jpg,.jpeg,.gif,.webp,.svg">
        </div>
        <button class="btn btn-shu" id="upload-btn" onclick="uploadSelected()">アップロード / Upload</button>
      </div>
      <div class="drop-hint">⬇ ここにファイルをドラッグ&ドロップでもOK / or drag &amp; drop files here</div>
      <p style="font-size:12px; color:var(--ink-soft); margin-top:8px;">
        同じファイル名で再アップロードすると、新しいバージョンとして保存されます。
      </p>
    </div>

    <h2 class="section-title">ドキュメント / Documents</h2>
    <div class="list" id="doc-list"><div class="empty">読み込み中…</div></div>

    <!-- Members (internal only) -->
    <section id="members-section" style="display:none">
      <h2 class="section-title">メンバー / Members</h2>
      <div class="card" style="margin-bottom:12px;">
        <div class="form-row">
          <div class="field">
            <label for="member-email">メールアドレス / Email</label>
            <input type="email" id="member-email" placeholder="client@example.com">
          </div>
          <div class="field">
            <label for="member-name">表示名 / Name (新規の場合)</label>
            <input type="text" id="member-name" placeholder="例: 田中様">
          </div>
          <div class="field" style="flex:0 0 200px;">
            <label for="member-role">権限 / Role</label>
            <select id="member-role">
              <option value="client_commenter">コメント可 / Can comment</option>
              <option value="client_viewer">閲覧のみ / View only</option>
              <option value="owner">オーナー / Owner</option>
            </select>
          </div>
          <button class="btn" onclick="inviteMember()">招待 / Invite</button>
        </div>
        <p style="font-size:12px; color:var(--ink-soft); margin-top:8px;">
          アカウントが未登録のメールアドレスなら、自動でアカウントを作成しパスワードを生成します。
        </p>
        <div class="card pw-card" id="pw-reveal" hidden>
          <div id="pw-title" style="font-weight:700; font-size:14px; margin-bottom:6px;"></div>
          <code id="pw-value"></code>
          <button class="btn btn-ghost btn-sm" onclick="copyPassword()" style="margin-left:8px;">コピー / Copy</button>
          <div class="pw-note">⚠ このパスワードは今回しか表示されません。クライアントに安全な方法で共有してください。</div>
        </div>
      </div>
      <div class="list" id="member-list"></div>
    </section>
  </main>

  <script src="js/brand.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script>
    const projectId = qs("id");
    const ROLE_LABEL = {
      owner: "オーナー / Owner",
      client_commenter: "コメント可 / Can comment",
      client_viewer: "閲覧のみ / View only"
    };

    async function init() {
      const profile = await requireAuth();
      if (!profile) return;
      renderHeader();
      if (!projectId) { location.href = "dashboard.html"; return; }

      let project;
      try {
        project = await apiGet(`/api/projects/${projectId}`);
        document.getElementById("project-title").textContent = project.name;
        document.title = `${BRAND.nameJa} — ${project.name}`;
      } catch (e) {
        document.getElementById("project-title").textContent = "プロジェクトが見つかりません";
        return;
      }

      if (project.can_manage) {
        document.getElementById("upload-card").style.display = "";
        document.getElementById("members-section").style.display = "";
        await loadMembers();
      }
      await loadDocuments();
    }

    // ---------- documents ----------

    async function loadDocuments() {
      const el = document.getElementById("doc-list");
      try {
        const docs = await apiGet(`/api/projects/${projectId}/documents`);
        if (!docs.length) {
          el.innerHTML = `<div class="empty">ドキュメントはまだありません。 / No documents yet.</div>`;
          return;
        }
        // group by filename → show latest version, link to viewer
        const groups = {};
        for (const d of docs) (groups[d.filename] ??= []).push(d);

        el.innerHTML = Object.entries(groups).map(([filename, versions]) => {
          const latest = versions[0];
          return `
            <a class="list-item" href="viewer.html?doc=${latest.id}">
              <div class="item-main">
                <div class="item-title">${escapeHtml(filename)}</div>
                <div class="item-sub">最終更新 ${fmtDate(latest.uploaded_at)}</div>
              </div>
              <div class="item-side">
                <span class="badge badge-shu">v${latest.version}</span>
                <span class="badge">${versions.length} version${versions.length > 1 ? "s" : ""}</span>
              </div>
            </a>`;
        }).join("");
      } catch (e) {
        el.innerHTML = `<div class="empty">${escapeHtml(e.message)}</div>`;
      }
    }

    async function uploadSelected() {
      const input = document.getElementById("file-input");
      if (!input.files.length) { toast("ファイルを選択してください", true); return; }
      await uploadFiles(input.files);
      input.value = "";
    }

    async function uploadFiles(fileList) {
      const btn = document.getElementById("upload-btn");
      btn.disabled = true;
      let ok = 0, fail = 0;
      try {
        for (const file of fileList) {
          try {
            const fd = new FormData();
            fd.append("file", file);
            const res = await apiUpload(`/api/projects/${projectId}/documents`, fd);
            toast(`${file.name} → v${res.version}`);
            ok++;
          } catch (e) {
            toast(`${file.name}: ${e.message}`, true);
            fail++;
          }
        }
        if (fileList.length > 1) {
          toast(`完了: ${ok}件成功${fail ? ` / ${fail}件失敗` : ""}`, fail > 0);
        }
        await loadDocuments();
      } finally {
        btn.disabled = false;
      }
    }

    // Drag & drop onto the upload card
    (function initDropzone() {
      const zone = document.getElementById("upload-card");
      let depth = 0;
      zone.addEventListener("dragenter", (e) => { e.preventDefault(); depth++; zone.classList.add("dragging"); });
      zone.addEventListener("dragover", (e) => { e.preventDefault(); });
      zone.addEventListener("dragleave", () => { if (--depth <= 0) { depth = 0; zone.classList.remove("dragging"); } });
      zone.addEventListener("drop", async (e) => {
        e.preventDefault();
        depth = 0;
        zone.classList.remove("dragging");
        const files = [...(e.dataTransfer?.files || [])];
        if (files.length) await uploadFiles(files);
      });
    })();

    // ---------- members ----------

    async function loadMembers() {
      const el = document.getElementById("member-list");
      try {
        const members = await apiGet(`/api/projects/${projectId}/members`);
        if (!members.length) {
          el.innerHTML = `<div class="empty">クライアントメンバーはまだいません。</div>`;
          return;
        }
        el.innerHTML = members.map(m => `
          <div class="list-item">
            <div class="item-main">
              <div class="item-title">${escapeHtml(m.display_name || "—")}</div>
              <div class="item-sub">${escapeHtml(m.email || "")}</div>
            </div>
            <div class="item-side">
              <span class="badge badge-ai">${ROLE_LABEL[m.member_role] || m.member_role}</span>
              ${m.account_role === "client" && m.user_id !== currentProfile.id ? `<button class="btn btn-ghost btn-sm" onclick="resetPassword('${m.user_id}', '${escapeHtml(m.email)}')">PWリセット</button>` : ""}
              ${m.user_id !== currentProfile.id ? `<button class="btn btn-ghost btn-sm" onclick="removeMember('${m.user_id}')">削除 / Remove</button>` : `<span class="badge">あなた / You</span>`}
            </div>
          </div>`).join("");
      } catch (e) {
        el.innerHTML = `<div class="empty">${escapeHtml(e.message)}</div>`;
      }
    }

    async function inviteMember() {
      const email = document.getElementById("member-email").value.trim().toLowerCase();
      const display_name = document.getElementById("member-name").value.trim();
      const member_role = document.getElementById("member-role").value;
      if (!email) { toast("メールアドレスを入力してください", true); return; }
      try {
        const res = await apiPost(`/api/projects/${projectId}/members/invite`, { email, display_name, member_role });
        document.getElementById("member-email").value = "";
        document.getElementById("member-name").value = "";
        if (res.created && res.password) {
          showPassword(`${res.email} のアカウントを作成しました`, res.password);
          toast("アカウントを作成し、メンバーに追加しました");
        } else {
          hidePassword();
          toast("既存アカウントをメンバーに追加しました");
        }
        await loadMembers();
      } catch (e) {
        toast(e.message, true);
      }
    }

    function showPassword(title, pw) {
      document.getElementById("pw-title").textContent = title;
      document.getElementById("pw-value").textContent = pw;
      document.getElementById("pw-reveal").hidden = false;
    }
    function hidePassword() { document.getElementById("pw-reveal").hidden = true; }

    async function copyPassword() {
      const pw = document.getElementById("pw-value").textContent;
      try { await navigator.clipboard.writeText(pw); toast("コピーしました"); }
      catch (e) { toast("コピーできませんでした — 手動で選択してください", true); }
    }

    async function resetPassword(userId, email) {
      if (!confirm(`${email} のパスワードをリセットしますか？\n(既存のログインセッションは無効になります)`)) return;
      try {
        const res = await apiPost(`/api/projects/${projectId}/members/${userId}/reset-password`);
        showPassword(`${res.email} の新しいパスワード`, res.password);
        toast("パスワードをリセットしました");
      } catch (e) {
        toast(e.message, true);
      }
    }

    async function removeMember(userId) {
      try {
        await apiDelete(`/api/projects/${projectId}/members/${userId}`);
        toast("メンバーを削除しました");
        await loadMembers();
      } catch (e) {
        toast("削除失敗: " + e.message, true);
      }
    }

    init();
  </script>
</body>
</html>
