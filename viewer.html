<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>__BRAND__ — ビューア</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="viewer-body">
  <div class="viewer-toolbar">
    <a class="brand" href="dashboard.html" style="gap:8px;">
      <span class="hanko" style="width:30px;height:30px;font-size:17px;" data-brand="mark"></span>
    </a>
    <a class="btn btn-ghost btn-sm" id="back-link" href="dashboard.html">← 戻る / Back</a>
    <span class="doc-name" id="doc-name">読み込み中…</span>
    <select id="version-select" onchange="switchVersion(this.value)"></select>
    <div class="spacer"></div>
    <span class="badge" id="uploaded-at"></span>
  </div>

  <iframe id="doc-frame" sandbox="allow-scripts allow-popups" title="Document preview"></iframe>

  <script src="js/brand.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script>
    let blobUrl = null;

    async function init() {
      const profile = await requireAuth();
      if (!profile) return;

      const docId = qs("doc");
      if (!docId) { location.href = "dashboard.html"; return; }
      await loadDoc(docId, true);
    }

    async function loadDoc(docId, buildVersionList) {
      let doc;
      try {
        doc = await apiGet(`/api/documents/${docId}`);
      } catch (e) {
        document.getElementById("doc-name").textContent = "ドキュメントが見つかりません";
        return;
      }

      document.getElementById("back-link").href = `project.html?id=${doc.project_id}`;
      document.getElementById("doc-name").textContent = doc.filename;
      document.getElementById("uploaded-at").textContent = fmtDate(doc.uploaded_at);
      document.title = `${BRAND.nameJa} — ${doc.filename}`;

      if (buildVersionList) {
        const sel = document.getElementById("version-select");
        sel.innerHTML = doc.versions.map((v, i) =>
          `<option value="${v.id}" ${v.id === doc.id ? "selected" : ""}>v${v.version}${i === 0 ? " (最新)" : ""}</option>`
        ).join("");
      }

      // Fetch HTML through the API (access-checked), render in the
      // sandboxed iframe via a blob URL. The doc's scripts run, but
      // in an opaque origin — no access to our session cookie.
      try {
        const html = await apiText(`/api/documents/${docId}/content`);
        if (blobUrl) URL.revokeObjectURL(blobUrl);
        blobUrl = URL.createObjectURL(new Blob([html], { type: "text/html" }));
        document.getElementById("doc-frame").src = blobUrl;
      } catch (e) {
        toast("ファイルの取得に失敗しました: " + e.message, true);
      }
    }

    async function switchVersion(docId) {
      history.replaceState(null, "", `viewer.html?doc=${docId}`);
      await loadDoc(docId, false);
    }

    init();
  </script>
</body>
</html>
