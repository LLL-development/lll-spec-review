<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>__BRAND__ — ログイン</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-brand">
        <span class="hanko" data-brand="mark"></span>
        <h1 data-brand="nameJa"></h1>
        <p data-brand="taglineLong"></p>
      </div>

      <div class="auth-toggle">
        <button id="tab-signin" class="active" onclick="setMode('signin')">ログイン / Sign in</button>
        <button id="tab-signup" onclick="setMode('signup')">新規登録 / Sign up</button>
      </div>

      <div class="field" id="field-name" style="display:none">
        <label for="display-name">表示名 / Display name</label>
        <input type="text" id="display-name" autocomplete="name" placeholder="山田 太郎">
      </div>
      <div class="field">
        <label for="email">メールアドレス / Email</label>
        <input type="email" id="email" autocomplete="email" placeholder="you@example.com">
      </div>
      <div class="field">
        <label for="password">パスワード / Password</label>
        <input type="password" id="password" autocomplete="current-password" placeholder="8文字以上">
      </div>

      <button class="btn" id="submit-btn" style="width:100%" onclick="submit()">ログイン / Sign in</button>

      <div class="auth-divider" id="google-divider" hidden><span>または / or</span></div>
      <button class="btn btn-ghost btn-google" id="google-btn" hidden onclick="location.href='/api/auth/google'">
        <svg width="17" height="17" viewBox="0 0 48 48" aria-hidden="true"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.5l6.7-6.7C35.6 2.4 30.1 0 24 0 14.6 0 6.5 5.4 2.6 13.2l7.8 6.1C12.3 13.4 17.7 9.5 24 9.5z"/><path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v9h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4.1 7.1-10.1 7.1-17.5z"/><path fill="#FBBC05" d="M10.4 28.7a14.5 14.5 0 0 1 0-9.4l-7.8-6.1a24 24 0 0 0 0 21.6l7.8-6.1z"/><path fill="#34A853" d="M24 48c6.1 0 11.6-2 15.4-5.5l-7.5-5.8c-2.1 1.4-4.8 2.3-7.9 2.3-6.3 0-11.7-3.9-13.6-9.3l-7.8 6.1C6.5 42.6 14.6 48 24 48z"/></svg>
        Googleでログイン / Sign in with Google
      </button>
      <div class="auth-error" id="auth-error"></div>
    </div>
  </div>

  <script src="js/brand.js"></script>
  <script src="js/api.js"></script>
  <script>
    let mode = "signin";

    function setMode(m) {
      mode = m;
      document.getElementById("tab-signin").classList.toggle("active", m === "signin");
      document.getElementById("tab-signup").classList.toggle("active", m === "signup");
      document.getElementById("field-name").style.display = m === "signup" ? "" : "none";
      document.getElementById("submit-btn").textContent =
        m === "signup" ? "登録する / Create account" : "ログイン / Sign in";
      document.getElementById("auth-error").textContent = "";
    }

    async function submit() {
      const btn = document.getElementById("submit-btn");
      const errEl = document.getElementById("auth-error");
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      errEl.textContent = "";

      if (!email || !password) {
        errEl.textContent = "メールアドレスとパスワードを入力してください。";
        return;
      }

      btn.disabled = true;
      try {
        if (mode === "signup") {
          const display_name = document.getElementById("display-name").value.trim();
          await apiPost("/api/auth/signup", { email, password, display_name });
        } else {
          await apiPost("/api/auth/login", { email, password });
        }
        location.href = "dashboard.html";
      } catch (e) {
        errEl.textContent = e.message || "エラーが発生しました。";
      } finally {
        btn.disabled = false;
      }
    }

    document.getElementById("password").addEventListener("keydown", e => {
      if (e.key === "Enter") submit();
    });

    // Show the Google button only if the server has it configured
    fetch("/api/auth/config").then(r => r.json()).then(cfg => {
      if (cfg.google) {
        document.getElementById("google-divider").hidden = false;
        document.getElementById("google-btn").hidden = false;
      }
    }).catch(() => {});

    // Surface OAuth errors passed back via ?error=
    const err = new URLSearchParams(location.search).get("error");
    if (err === "google") {
      document.getElementById("auth-error").textContent = "Googleログインに失敗しました。もう一度お試しください。";
    } else if (err === "google_unconfigured") {
      document.getElementById("auth-error").textContent = "Googleログインは未設定です。";
    }

    // Already signed in? Skip to dashboard.
    fetch("/api/auth/me", { credentials: "same-origin" })
      .then(r => { if (r.ok) location.href = "dashboard.html"; });
  </script>
</body>
</html>
