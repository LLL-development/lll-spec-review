<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>__BRAND__ — ログイン</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-brand">
        <span class="hanko" data-brand="mark"></span>
        <h1 data-brand="nameJa"></h1>
        <p data-brand="taglineLong"></p>
      </div>

      <div class="auth-toggle">
        <button id="tab-signin" class="active" onclick="setMode('signin')">ログイン / Sign in</button>
        <button id="tab-signup" onclick="setMode('signup')">新規登録 / Sign up</button>
      </div>

      <div class="field" id="field-name" style="display:none">
        <label for="display-name">表示名 / Display name</label>
        <input type="text" id="display-name" autocomplete="name" placeholder="山田 太郎">
      </div>
      <div class="field">
        <label for="email">メールアドレス / Email</label>
        <input type="email" id="email" autocomplete="email" placeholder="you@example.com">
      </div>
      <div class="field">
        <label for="password">パスワード / Password</label>
        <input type="password" id="password" autocomplete="current-password" placeholder="8文字以上">
      </div>

      <button class="btn" id="submit-btn" style="width:100%" onclick="submit()">ログイン / Sign in</button>
      <div class="auth-error" id="auth-error"></div>
    </div>
  </div>

  <script src="js/brand.js"></script>
  <script src="js/api.js"></script>
  <script>
    let mode = "signin";

    function setMode(m) {
      mode = m;
      document.getElementById("tab-signin").classList.toggle("active", m === "signin");
      document.getElementById("tab-signup").classList.toggle("active", m === "signup");
      document.getElementById("field-name").style.display = m === "signup" ? "" : "none";
      document.getElementById("submit-btn").textContent =
        m === "signup" ? "登録する / Create account" : "ログイン / Sign in";
      document.getElementById("auth-error").textContent = "";
    }

    async function submit() {
      const btn = document.getElementById("submit-btn");
      const errEl = document.getElementById("auth-error");
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      errEl.textContent = "";

      if (!email || !password) {
        errEl.textContent = "メールアドレスとパスワードを入力してください。";
        return;
      }

      btn.disabled = true;
      try {
        if (mode === "signup") {
          const display_name = document.getElementById("display-name").value.trim();
          await apiPost("/api/auth/signup", { email, password, display_name });
        } else {
          await apiPost("/api/auth/login", { email, password });
        }
        location.href = "dashboard.html";
      } catch (e) {
        errEl.textContent = e.message || "エラーが発生しました。";
      } finally {
        btn.disabled = false;
      }
    }

    document.getElementById("password").addEventListener("keydown", e => {
      if (e.key === "Enter") submit();
    });

    // Already signed in? Skip to dashboard.
    fetch("/api/auth/me", { credentials: "same-origin" })
      .then(r => { if (r.ok) location.href = "dashboard.html"; });
  </script>
</body>
</html>
