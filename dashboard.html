<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>__BRAND__ — プロジェクト</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header id="app-header"></header>

  <main class="container">
    <div class="eyebrow">Projects</div>
    <h1 class="page-title">プロジェクト一覧</h1>

    <div class="card" id="create-card" style="display:none; margin-bottom:28px;">
      <div class="form-row">
        <div class="field">
          <label for="new-name">プロジェクト名 / Project name</label>
          <input type="text" id="new-name" placeholder="例: まいぷれ仕様書">
        </div>
        <div class="field">
          <label for="new-client">クライアント名 / Client</label>
          <input type="text" id="new-client" placeholder="例: 〇〇株式会社">
        </div>
        <button class="btn btn-shu" onclick="createProject()">作成 / Create</button>
      </div>
    </div>

    <div class="list" id="project-list">
      <div class="empty">読み込み中… / Loading…</div>
    </div>
  </main>

  <script src="js/brand.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script>
    async function init() {
      const profile = await requireAuth();
      if (!profile) return;
      renderHeader();
      document.getElementById("create-card").style.display = "";
      await loadProjects();
    }

    async function loadProjects() {
      const listEl = document.getElementById("project-list");
      try {
        const projects = await apiGet("/api/projects");
        if (!projects.length) {
          listEl.innerHTML = `<div class="empty">プロジェクトがまだありません。上のフォームから作成できます。<br>Create your first project above.</div>`;
          return;
        }
        listEl.innerHTML = projects.map(p => `
          <a class="list-item" href="project.html?id=${p.id}">
            <div class="item-main">
              <div class="item-title">${escapeHtml(p.name)}</div>
              <div class="item-sub">${escapeHtml(p.client_name || "—")} ・ ${fmtDate(p.created_at)}</div>
            </div>
            <div class="item-side"><span class="badge badge-ai">開く / Open</span></div>
          </a>`).join("");
      } catch (e) {
        listEl.innerHTML = `<div class="empty">読み込みに失敗しました: ${escapeHtml(e.message)}</div>`;
      }
    }

    async function createProject() {
      const name = document.getElementById("new-name").value.trim();
      const client_name = document.getElementById("new-client").value.trim();
      if (!name) { toast("プロジェクト名を入力してください", true); return; }
      try {
        await apiPost("/api/projects", { name, client_name });
        document.getElementById("new-name").value = "";
        document.getElementById("new-client").value = "";
        toast("プロジェクトを作成しました");
        await loadProjects();
      } catch (e) {
        toast("作成に失敗しました: " + e.message, true);
      }
    }

    init();
  </script>
</body>
</html>
