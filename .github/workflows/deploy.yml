name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      apply_schema:
        description: "Also apply schema.sql to remote D1 (first-time setup)"
        type: boolean
        default: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build frontend → dist/
        run: bash ./build.sh

      - name: Apply D1 schema (manual runs only, if requested)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.apply_schema }}
        run: npx wrangler d1 execute lll-spec-review --remote --file=./schema.sql
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy Worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
